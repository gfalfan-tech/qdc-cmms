<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>QDC CMMS — Activos y Equipos</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>

*{box-sizing:border-box;margin:0;padding:0;}
:root{--navy:#08223D;--mid:#0B2545;--deep:#061C2E;--accent:#2196F3;--white:#EEF4FF;--ok:#97C459;--warn:#EF9F27;--crit:#E24B4A;--ext:#5DCAA5;--pm:#7F77DD;--emb:#D85A30;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.10);--font:'Barlow',sans-serif;--head:'Barlow Condensed',sans-serif;}
body{font-family:var(--font);background:#050F1C;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.shell{display:flex;width:100%;max-width:1100px;min-height:900px;background:var(--mid);border-radius:12px;overflow:hidden;border:1px solid var(--border2);}
.sidebar{width:210px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;border-right:1px solid var(--border);}
.sb-logo{padding:16px 14px 12px;border-bottom:1px solid var(--border);}
.sb-logo-mark{font-family:var(--head);font-size:15px;font-weight:700;color:var(--white);letter-spacing:1px;}
.sb-logo-sub{font-size:9px;color:rgba(131,131,139,0.6);margin-top:2px;}
.sb-logo-line{width:20px;height:2px;background:var(--accent);margin-top:5px;}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0;}
.sb-nav::-webkit-scrollbar{width:2px;}
.nav-sec{padding:10px 14px 3px;font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(131,131,139,0.4);}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;border-left:2px solid transparent;transition:background .1s;text-decoration:none;}
.nav-item:hover{background:rgba(255,255,255,0.04);}
.nav-item.active{background:rgba(33,150,243,0.12);border-left-color:var(--accent);}
.nav-icon{font-size:13px;width:16px;text-align:center;flex-shrink:0;}
.nav-label{font-size:12px;color:rgba(200,210,225,0.7);flex:1;}
.nav-item.active .nav-label{color:var(--white);font-weight:500;}
.sb-user{padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.u-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.u-name{font-size:11px;color:var(--white);font-weight:500;}
.u-role{font-size:9px;color:rgba(131,131,139,0.6);}
.u-logout{margin-left:auto;background:none;border:none;color:rgba(131,131,139,0.4);cursor:pointer;font-size:11px;padding:3px 6px;border-radius:3px;}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.topbar{height:50px;background:var(--mid);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;}
.page-title{font-family:var(--head);font-size:16px;font-weight:600;color:var(--white);flex:1;}
.tb-btn{padding:6px 13px;border-radius:5px;border:none;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .15s;}
.btn-p{background:var(--accent);color:#fff;}.btn-p:hover{background:#1976D2;}
.btn-g{background:rgba(255,255,255,0.06);color:rgba(200,210,225,0.8);border:0.5px solid rgba(255,255,255,0.1);}
.stats-bar{display:flex;gap:1px;background:rgba(255,255,255,0.04);border-bottom:1px solid var(--border);flex-shrink:0;}
.stat{flex:1;padding:9px 12px;text-align:center;}
.stat-val{font-size:18px;font-weight:500;color:var(--white);}
.stat-label{font-size:9px;color:rgba(131,131,139,0.5);margin-top:2px;text-transform:uppercase;}
.content-pad{flex:1;overflow-y:auto;padding:16px;}
.content-pad::-webkit-scrollbar{width:3px;}
.content-pad::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);}
.data-table{width:100%;border-collapse:collapse;margin-top:10px;}
.data-table th{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:rgba(131,131,139,0.5);padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);}
.data-table td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle;}
.data-table tr:hover td{background:rgba(255,255,255,0.03);}
.badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;}
.b-ok{background:rgba(99,153,34,0.15);color:#C0DD97;}
.b-warn{background:rgba(239,159,39,0.15);color:#FAC775;}
.b-crit{background:rgba(226,75,74,0.15);color:#F09595;}
.b-ext{background:rgba(29,158,117,0.15);color:#5DCAA5;}
.b-info{background:rgba(33,150,243,0.12);color:#85B7EB;}
.b-pm{background:rgba(127,119,221,0.12);color:#AFA9EC;}
.card{background:rgba(255,255,255,0.03);border:0.5px solid rgba(255,255,255,0.07);border-radius:8px;padding:14px;margin-bottom:12px;}
.kpi-grid{display:grid;gap:10px;margin-bottom:14px;}
.kpi-grid-4{grid-template-columns:repeat(4,1fr);}
.kpi-grid-3{grid-template-columns:repeat(3,1fr);}
.kpi{background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.07);border-radius:8px;padding:12px 14px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi-blue::before{background:var(--accent);}.kpi-green::before{background:var(--ok);}
.kpi-warn::before{background:var(--warn);}.kpi-crit::before{background:var(--crit);}
.kpi-ext::before{background:var(--ext);}.kpi-pm::before{background:var(--pm);}
.kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:rgba(131,131,139,0.5);margin-bottom:5px;}
.kpi-val{font-size:22px;font-weight:600;font-family:var(--head);color:var(--white);}
.kpi-sub{font-size:9px;color:rgba(131,131,139,0.45);margin-top:3px;}
.search-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sw{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:5px;padding:5px 10px;flex:1;}
.sw input{background:none;border:none;outline:none;color:var(--white);font-size:12px;font-family:var(--font);width:100%;}
.sw input::placeholder{color:rgba(131,131,139,0.5);}
.form-group{margin-bottom:12px;}
.form-label{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:rgba(131,131,139,0.6);margin-bottom:5px;display:block;}
.form-input,.form-select,.form-textarea{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:var(--white);font-size:12px;font-family:var(--font);padding:8px 10px;outline:none;width:100%;transition:border-color .1s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-input::placeholder,.form-textarea::placeholder{color:rgba(131,131,139,0.4);}
.form-select option{background:#0D2D48;}
.form-textarea{resize:vertical;min-height:70px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:500;}
.modal-overlay.hidden{display:none;}
.modal{background:#0D2D48;border:0.5px solid rgba(255,255,255,0.1);border-radius:10px;width:500px;max-height:85vh;overflow-y:auto;padding:22px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title{font-family:var(--head);font-size:16px;font-weight:600;color:var(--white);}
.modal-close{font-size:16px;color:rgba(131,131,139,0.6);cursor:pointer;background:none;border:none;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.07);}
.btn-cancel{padding:7px 14px;border-radius:5px;border:0.5px solid rgba(255,255,255,0.1);background:transparent;color:rgba(200,210,225,0.7);cursor:pointer;font-size:12px;font-family:var(--font);}
.btn-save{padding:7px 18px;border-radius:5px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font);}
.spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;gap:12px;color:rgba(131,131,139,0.5);}
.empty{display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:12px;color:rgba(131,131,139,0.35);}
#toast{position:fixed;bottom:24px;right:24px;background:#0D2D48;border:1px solid rgba(33,150,243,0.3);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--white);z-index:9999;transform:translateY(60px);opacity:0;transition:all .3s;max-width:320px;pointer-events:none;}
#toast.show{transform:translateY(0);opacity:1;}


</style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">

    <div class="sb-logo">
      <div class="sb-logo-mark">QDC · CMMS Pro</div>
      <div class="sb-logo-sub">Química del Campo S.p.A</div>
      <div class="sb-logo-line"></div>
    </div>
    <div class="sb-nav">
      <div class="nav-sec">Principal</div>
      <a class="nav-item" href="qdc_dashboard.html"><span class="nav-icon">▦</span><span class="nav-label">Dashboard</span></a>
      <a class="nav-item" href="qdc_ot.html"><span class="nav-icon">📋</span><span class="nav-label">Órdenes de trabajo</span></a>
      <div class="nav-sec">Mantenimiento</div>
      <a class="nav-item " href="qdc_pm.html"><span class="nav-icon">🔄</span><span class="nav-label">Plan preventivo</span></a>
      <a class="nav-item " href="qdc_contratistas.html"><span class="nav-icon">🏢</span><span class="nav-label">Contratistas</span></a>
      <div class="nav-sec">Recursos</div>
      <a class="nav-item active" href="qdc_activos.html"><span class="nav-icon">🏭</span><span class="nav-label">Activos y equipos</span></a>
      <a class="nav-item" href="qdc_inventario.html"><span class="nav-icon">📦</span><span class="nav-label">Inventario</span></a>
      <div class="nav-sec">Operaciones</div>
      <a class="nav-item " href="qdc_embalajes.html"><span class="nav-icon">📫</span><span class="nav-label">Embalajes</span></a>
      <div class="nav-sec">Análisis</div>
      <a class="nav-item " href="qdc_kpis.html"><span class="nav-icon">📊</span><span class="nav-label">KPIs y reportes</span></a>
      <div class="nav-sec">Sistema</div>
      <a class="nav-item " href="qdc_alertas.html"><span class="nav-icon">🔔</span><span class="nav-label">Alertas</span></a>
      <a class="nav-item" id="nav-config" href="qdc_config.html" style="display:none"><span class="nav-icon">⚙️</span><span class="nav-label">Configuración</span></a>
    </div>
    <div class="sb-user" id="sb-user"></div>

  </nav>
  <div class="main">

    <div class="topbar">
      <div class="page-title">Activos y Equipos</div>
      <button class="tb-btn btn-g" onclick="loadActivos()">↻ Actualizar</button>
      <button class="tb-btn btn-p" id="btn-nuevo-act" style="display:none" onclick="openNuevoActivo()">+ Nuevo activo</button>
    </div>
    <div class="search-row">
      <div class="sw"><span style="font-size:11px;color:rgba(131,131,139,0.5)">🔍</span><input type="text" placeholder="Buscar activo, código, ubicación…" oninput="filterActivos(this.value)"/></div>
      <select class="form-select" style="width:130px;padding:6px 10px" onchange="filterByEst(this.value)">
        <option value="">Todos</option>
        <option value="crit">Críticos</option>
        <option value="warn">Alerta</option>
        <option value="ok">Operativos</option>
      </select>
    </div>
    <div class="content-pad" id="act-content">
      <div class="loading"><div class="spinner"></div><span>Cargando activos…</span></div>
    </div>

  </div>
</div>
<div id="toast"></div>
<div class="modal-overlay hidden" id="modal-overlay"><div class="modal" id="modal-inner"></div></div>
<script>

const SB_URL='https://aaugeuydymhwlcpklbmt.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhdWdldXlkeW1od2xjcGtsYm10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTg5MzksImV4cCI6MjA5MjIzNDkzOX0.Q2GeJKuf7l51Hsv3hUEeaO0NHaFeWXLIBrRUPgkQ0gw';
let db,USER;
(function(){
  const s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
  s.onload=function(){
    db=window.supabase.createClient(SB_URL,SB_KEY);
    USER=JSON.parse(localStorage.getItem('qdc_user')||'{}');
    if(!USER.rol){window.location.href='index.html';return;}
    buildSidebar();
    if(USER.rol==='g')document.getElementById('nav-config').style.display='flex';
    if(typeof pageInit==='function') pageInit();
  };
  document.head.appendChild(s);
})();
function ini(e){const p=(e||'').split('@')[0].split(/[._-]/);return p.slice(0,2).map(x=>x[0]?.toUpperCase()||'').join('')||'QD';}
function buildSidebar(){
  const C={t:'#185FA5',s:'#854F0B',g:'#27500A'},T={t:'#B5D4F4',s:'#FAC775',g:'#C0DD97'},R={t:'Técnico de Mantenimiento',s:'Supervisor de Mantenimiento',g:'Gerente de Operaciones'};
  document.getElementById('sb-user').innerHTML=`<div class="u-av" style="background:${C[USER.rol]};color:${T[USER.rol]}">${ini(USER.email||USER.nombre)}</div><div style="min-width:0;flex:1"><div class="u-name">${USER.nombre||USER.email}</div><div class="u-role">${R[USER.rol]||''}</div></div><button class="u-logout" onclick="doLogout()">⏏</button>`;
}
function doLogout(){localStorage.removeItem('qdc_user');window.location.href='index.html';}
async function audit(tipo,accion,detalle){
  try{await db.from('auditoria').insert({usuario_id:USER.id,usuario_nombre:USER.nombre||USER.email,tipo,accion,detalle});}catch(e){}
}
let _tT;
function showToast(msg,col){const t=document.getElementById('toast');t.textContent=msg;t.style.borderColor=col||'rgba(33,150,243,0.3)';t.classList.add('show');clearTimeout(_tT);_tT=setTimeout(()=>t.classList.remove('show'),3200);}
function openModal(html){document.getElementById('modal-inner').innerHTML=html;document.getElementById('modal-overlay').classList.remove('hidden');}
function closeModal(){document.getElementById('modal-overlay').classList.add('hidden');}


let ACTS=[], ACT_F='';
function pageInit(){
  if(USER.rol==='s') document.getElementById('btn-nuevo-act').style.display='block';
  loadActivos();
}
async function loadActivos(){
  try{
    const{data,error}=await db.from('activos').select('*').order('nombre');
    if(error) throw error;
    ACTS=data&&data.length?data:demosActivos();
  }catch(e){ ACTS=demosActivos(); showToast('Mostrando datos demo'); }
  renderActivos(ACTS);
}
function demosActivos(){return[
  {id:'a1',nombre:'Compresor C-101',codigo:'AST-021',ubicacion:'Línea A',categoria:'Compresor',estado:'crit',salud:38,icono:'⚙️'},
  {id:'a2',nombre:'Bomba P-205',codigo:'AST-033',ubicacion:'Sala Bombas',categoria:'Bomba',estado:'warn',salud:74,icono:'💧'},
  {id:'a3',nombre:'Turbina T-01',codigo:'AST-005',ubicacion:'Planta 2',categoria:'Turbina',estado:'ok',salud:96,icono:'🌀'},
  {id:'a4',nombre:'Motor MO-18',codigo:'AST-018',ubicacion:'Línea B',categoria:'Motor',estado:'ok',salud:91,icono:'⚡'},
  {id:'a5',nombre:'Enfriadora CH-3',codigo:'AST-009',ubicacion:'Sala Frío',categoria:'HVAC',estado:'ok',salud:88,icono:'❄️'},
  {id:'a6',nombre:'Tablero E-01',codigo:'AST-044',ubicacion:'Sala Control',categoria:'Eléctrico',estado:'ok',salud:85,icono:'🖥️'},
];}
function getColor(est,salud){
  if(est==='crit'||salud<60) return 'var(--crit)';
  if(est==='warn'||salud<85) return 'var(--warn)';
  return 'var(--ok)';
}
function renderActivos(list){
  if(!list.length){document.getElementById('act-content').innerHTML='<div class="empty"><span style="font-size:32px;opacity:0.2">🏭</span><span>Sin activos registrados</span></div>';return;}
  document.getElementById('act-content').innerHTML=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">${list.map(a=>{
    const c=getColor(a.estado,a.salud||85);
    return`<div class="kpi" style="border-left:3px solid ${c};cursor:pointer" onclick="verActivo('${a.id}')">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div style="font-size:24px">${a.icono||'🏭'}</div>
        <div><div style="font-family:var(--head);font-size:14px;font-weight:600;color:var(--white)">${a.nombre}</div><div style="font-size:10px;font-family:monospace;color:rgba(131,131,139,0.5)">${a.codigo||'—'} · ${a.ubicacion||'—'}</div></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(131,131,139,0.5)">Salud</span><span style="font-family:var(--head);font-size:16px;font-weight:600;color:${c}">${a.salud||85}%</span></div>
      <div style="height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin-bottom:6px"><div style="height:100%;width:${a.salud||85}%;background:${c};border-radius:2px"></div></div>
      <span class="badge ${a.estado==='ok'||!a.estado?'b-ok':a.estado==='warn'?'b-warn':'b-crit'}">${a.estado==='ok'||!a.estado?'Operativo':a.estado==='warn'?'Alerta':'Crítico'}</span>
    </div>`;
  }).join('')}</div>`;
}
function filterActivos(val){
  const v=val.toLowerCase();
  let list=ACTS.filter(a=>(a.nombre||'').toLowerCase().includes(v)||(a.codigo||'').toLowerCase().includes(v)||(a.ubicacion||'').toLowerCase().includes(v));
  if(ACT_F) list=list.filter(a=>a.estado===ACT_F||(ACT_F==='ok'&&!a.estado));
  renderActivos(list);
}
function filterByEst(v){ACT_F=v;filterActivos(document.querySelector('.sw input')?.value||'');}
function verActivo(id){
  const a=ACTS.find(x=>x.id===id);if(!a) return;
  const c=getColor(a.estado,a.salud||85);
  openModal(`<div class="modal-header"><div class="modal-title">${a.icono||'🏭'} ${a.nombre}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px">
      <div class="card" style="padding:8px 10px"><div style="font-size:9px;text-transform:uppercase;color:rgba(131,131,139,0.4);margin-bottom:3px">Código</div><div style="font-size:12px;font-family:monospace;color:var(--white)">${a.codigo||'—'}</div></div>
      <div class="card" style="padding:8px 10px"><div style="font-size:9px;text-transform:uppercase;color:rgba(131,131,139,0.4);margin-bottom:3px">Ubicación</div><div style="font-size:12px;color:var(--white)">${a.ubicacion||'—'}</div></div>
      <div class="card" style="padding:8px 10px"><div style="font-size:9px;text-transform:uppercase;color:rgba(131,131,139,0.4);margin-bottom:3px">Categoría</div><div style="font-size:12px;color:var(--white)">${a.categoria||'—'}</div></div>
      <div class="card" style="padding:8px 10px"><div style="font-size:9px;text-transform:uppercase;color:rgba(131,131,139,0.4);margin-bottom:3px">Salud</div><div style="font-size:16px;font-weight:700;font-family:var(--head);color:${c}">${a.salud||85}%</div></div>
    </div>
    <div style="height:6px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;margin-bottom:14px"><div style="height:100%;width:${a.salud||85}%;background:${c}"></div></div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Cerrar</button></div>`);
}
function openNuevoActivo(){
  openModal(`<div class="modal-header"><div class="modal-title">Nuevo activo</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="form-row" style="margin-bottom:12px">
      <div class="form-group"><label class="form-label">Nombre *</label><input type="text" class="form-input" id="na-nombre" placeholder="ej: Compresor C-102"/></div>
      <div class="form-group"><label class="form-label">Código</label><input type="text" class="form-input" id="na-codigo" placeholder="AST-XXX"/></div>
    </div>
    <div class="form-row" style="margin-bottom:12px">
      <div class="form-group"><label class="form-label">Ubicación</label><input type="text" class="form-input" id="na-ubic" placeholder="ej: Línea A"/></div>
      <div class="form-group"><label class="form-label">Categoría</label><select class="form-select" id="na-cat"><option>Compresor</option><option>Bomba</option><option>Motor</option><option>Turbina</option><option>HVAC</option><option>Eléctrico</option><option>Otro</option></select></div>
    </div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="guardarActivo()">Crear activo</button></div>`);
}
async function guardarActivo(){
  const nombre=document.getElementById('na-nombre').value.trim();
  if(!nombre){showToast('⚠️ El nombre es obligatorio','rgba(226,75,74,0.4)');return;}
  const nuevo={nombre,codigo:document.getElementById('na-codigo').value.trim(),ubicacion:document.getElementById('na-ubic').value.trim(),categoria:document.getElementById('na-cat').value,estado:'ok',salud:100};
  try{
    const{data,error}=await db.from('activos').insert(nuevo).select().single();
    if(error) throw error;
    ACTS.unshift(data);
    await audit('create','Creó activo',nombre);
    closeModal(); showToast('✓ Activo creado','rgba(99,153,34,0.4)'); renderActivos(ACTS);
  }catch(err){ showToast('✕ Error: '+err.message,'rgba(226,75,74,0.4)'); }
}

</script>
