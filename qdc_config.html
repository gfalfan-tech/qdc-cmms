<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>QDC CMMS — Configuración</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#08223D;--mid:#0B2545;--deep:#061C2E;
  --accent:#2196F3;--white:#EEF4FF;
  --ok:#97C459;--warn:#EF9F27;--crit:#E24B4A;--ext:#5DCAA5;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.10);
  --font:'Barlow',sans-serif;--head:'Barlow Condensed',sans-serif;
}
body{font-family:var(--font);background:#050F1C;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.shell{display:flex;width:100%;max-width:1100px;height:860px;background:var(--mid);border-radius:12px;overflow:hidden;border:1px solid var(--border2);}

/* SIDEBAR */
.sidebar{width:210px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;border-right:1px solid var(--border);}
.sb-logo{padding:16px 14px 12px;border-bottom:1px solid var(--border);}
.sb-logo-mark{font-family:var(--head);font-size:16px;font-weight:700;color:var(--white);letter-spacing:1px;}
.sb-logo-sub{font-size:9px;color:rgba(131,131,139,0.6);margin-top:2px;}
.sb-logo-line{width:20px;height:2px;background:var(--accent);margin-top:5px;}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0;}
.nav-sec{padding:10px 14px 3px;font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(131,131,139,0.4);}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;border-left:2px solid transparent;transition:background .1s;}
.nav-item:hover{background:rgba(255,255,255,0.04);}
.nav-item.active{background:rgba(33,150,243,0.12);border-left-color:var(--accent);}
.nav-icon{font-size:13px;width:16px;text-align:center;}
.nav-label{font-size:12px;color:rgba(200,210,225,0.7);flex:1;}
.nav-item.active .nav-label{color:var(--white);font-weight:500;}
.sb-user{padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.u-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.u-name{font-size:11px;color:var(--white);font-weight:500;}
.u-role{font-size:9px;color:rgba(131,131,139,0.6);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.topbar{height:50px;background:var(--mid);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;}
.page-title{font-family:var(--head);font-size:16px;font-weight:600;color:var(--white);flex:1;letter-spacing:0.5px;}

/* CONTENT LAYOUT */
.cfg-layout{flex:1;display:flex;overflow:hidden;}
.cfg-sidebar{width:200px;flex-shrink:0;border-right:1px solid var(--border);padding:10px 0;overflow-y:auto;}
.cfg-item{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;transition:background .1s;border-left:2px solid transparent;}
.cfg-item:hover{background:rgba(255,255,255,0.04);}
.cfg-item.on{background:rgba(33,150,243,0.1);border-left-color:var(--accent);}
.cfg-item-icon{font-size:14px;width:18px;text-align:center;}
.cfg-item-label{font-size:12px;color:rgba(200,210,225,0.7);}
.cfg-item.on .cfg-item-label{color:var(--white);font-weight:500;}
.cfg-content{flex:1;overflow-y:auto;padding:20px;}
.cfg-content::-webkit-scrollbar{width:3px;}
.cfg-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);}

/* SECTION */
.cfg-section-title{font-family:var(--head);font-size:18px;font-weight:600;color:var(--white);margin-bottom:4px;}
.cfg-section-sub{font-size:12px;color:rgba(131,131,139,0.6);margin-bottom:20px;}
.sec-title{font-size:10px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;color:rgba(131,131,139,0.45);margin-bottom:10px;}

/* USER CARDS */
.user-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.user-card{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:8px;
  background:rgba(255,255,255,0.03);
  border:0.5px solid rgba(255,255,255,0.07);
  transition:background .1s;
}
.user-card:hover{background:rgba(255,255,255,0.05);}
.user-card.inactive{opacity:0.5;}
.ua{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-size:14px;font-weight:700;flex-shrink:0;}
.u-info{flex:1;}
.u-fullname{font-size:13px;font-weight:500;color:var(--white);}
.u-email{font-size:11px;color:rgba(131,131,139,0.6);margin-top:1px;font-family:monospace;}
.u-meta{font-size:10px;color:rgba(131,131,139,0.4);margin-top:2px;}
.role-pill{font-size:10px;font-weight:500;padding:3px 10px;border-radius:10px;}
.rp-t{background:rgba(24,95,165,0.2);color:#B5D4F4;}
.rp-s{background:rgba(133,79,11,0.2);color:#FAC775;}
.rp-g{background:rgba(39,80,10,0.2);color:#C0DD97;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sd-on{background:var(--ok);}
.sd-off{background:rgba(131,131,139,0.3);}
.action-btns{display:flex;gap:5px;}
.ab{padding:4px 10px;border-radius:4px;border:0.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(200,210,225,0.7);cursor:pointer;font-size:10px;font-family:var(--font);transition:all .1s;}
.ab:hover{background:rgba(255,255,255,0.1);color:var(--white);}
.ab.danger{border-color:rgba(226,75,74,0.3);color:#F09595;}
.ab.danger:hover{background:rgba(226,75,74,0.1);}
.ab.success{border-color:rgba(99,153,34,0.3);color:#C0DD97;}
.ab.success:hover{background:rgba(99,153,34,0.1);}

/* FORM */
.form-card{background:rgba(255,255,255,0.03);border:0.5px solid rgba(255,255,255,0.08);border-radius:8px;padding:16px;margin-bottom:16px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-row.full{grid-template-columns:1fr;}
.form-row.three{grid-template-columns:1fr 1fr 1fr;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:rgba(131,131,139,0.6);}
.req{color:var(--accent);}
.form-input,.form-select{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:var(--white);font-size:12px;font-family:var(--font);padding:8px 10px;outline:none;transition:border-color .1s;}
.form-input:focus,.form-select:focus{border-color:var(--accent);}
.form-input::placeholder{color:rgba(131,131,139,0.4);}
.form-select option{background:#0D2D48;}
.form-hint{font-size:10px;color:rgba(131,131,139,0.4);margin-top:2px;}
.form-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.06);}
.btn-cancel{padding:7px 14px;border-radius:5px;border:0.5px solid rgba(255,255,255,0.1);background:transparent;color:rgba(200,210,225,0.7);cursor:pointer;font-size:12px;font-family:var(--font);}
.btn-save{padding:7px 18px;border-radius:5px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font);}
.btn-save:hover{background:#1976D2;}

/* AUDIT LOG */
.log-list{display:flex;flex-direction:column;gap:4px;}
.log-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:9px 12px;border-radius:6px;
  background:rgba(255,255,255,0.02);
  border-left:2px solid;
  font-size:12px;
}
.log-item.create{border-color:rgba(99,153,34,0.5);}
.log-item.edit{border-color:rgba(33,150,243,0.5);}
.log-item.deact{border-color:rgba(239,159,39,0.5);}
.log-item.login{border-color:rgba(131,131,139,0.3);}
.log-item.ot{border-color:rgba(33,150,243,0.4);}
.log-item.emb{border-color:rgba(216,90,48,0.4);}
.log-time{font-family:monospace;font-size:10px;color:rgba(131,131,139,0.45);white-space:nowrap;flex-shrink:0;margin-top:1px;}
.log-body{flex:1;}
.log-action{color:var(--white);font-weight:500;}
.log-detail{font-size:10px;color:rgba(131,131,139,0.5);margin-top:1px;}
.log-user{font-size:10px;font-weight:500;padding:1px 6px;border-radius:8px;flex-shrink:0;}
.lu-t{background:rgba(24,95,165,0.15);color:#B5D4F4;}
.lu-s{background:rgba(133,79,11,0.15);color:#FAC775;}
.lu-g{background:rgba(39,80,10,0.15);color:#C0DD97;}

/* ALERT BOX */
.alert-box{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 14px;border-radius:7px;
  background:rgba(239,159,39,0.07);
  border:1px solid rgba(239,159,39,0.2);
  font-size:12px;color:#FAC775;
  margin-bottom:14px;line-height:1.5;
}
.alert-box.info{background:rgba(33,150,243,0.07);border-color:rgba(33,150,243,0.2);color:#85B7EB;}
.alert-box.ok{background:rgba(99,153,34,0.07);border-color:rgba(99,153,34,0.2);color:#C0DD97;}

/* INFO CARD */
.info-card{background:rgba(255,255,255,0.03);border:0.5px solid rgba(255,255,255,0.07);border-radius:8px;padding:14px;margin-bottom:10px;}
.info-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.info-row:last-child{border-bottom:none;}
.info-label{font-size:12px;color:rgba(200,210,225,0.6);}
.info-val{font-size:12px;color:var(--white);font-weight:500;}
.info-val.ok{color:var(--ok);}
.info-val.warn{color:var(--warn);}

/* MODAL */
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.72);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal-overlay.hidden{display:none;}
.modal{background:#0D2D48;border:0.5px solid rgba(255,255,255,0.1);border-radius:10px;width:480px;max-height:680px;overflow-y:auto;padding:22px;}
.modal::-webkit-scrollbar{width:3px;}
.modal::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-title{font-family:var(--head);font-size:16px;font-weight:600;color:var(--white);}
.modal-close{font-size:16px;color:rgba(131,131,139,0.6);cursor:pointer;background:none;border:none;}
.modal-close:hover{color:var(--white);}
.pw-strength{height:3px;border-radius:2px;margin-top:5px;transition:all .2s;}
.pw-hint{font-size:10px;margin-top:3px;}

/* TOAST */
#cfg-toast{
  position:absolute;bottom:20px;right:20px;
  background:#0D2D48;border:1px solid rgba(33,150,243,0.3);
  border-radius:7px;padding:10px 14px;font-size:12px;
  color:var(--white);z-index:200;
  transform:translateY(60px);opacity:0;transition:all .25s;
  max-width:280px;
}
#cfg-toast.show{transform:translateY(0);opacity:1;}

.shell-wrap{position:relative;width:100%;max-width:1100px;}
</style>
</head>

</div>
</div>

<script>
let toastT;
function toast(msg, color){
  const t=document.getElementById('cfg-toast');
  t.textContent=msg;
  t.style.borderColor=color||'rgba(33,150,243,0.3)';
  t.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),3000);
}

function openModal(html){
  document.getElementById('modal-inner').innerHTML=html;
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal(){
  document.getElementById('modal').classList.add('hidden');
}
document.getElementById('modal').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});

// ── USERS DATA ──

const rolPill  = r=> r==='t'?'rp-t':r==='s'?'rp-s':'rp-g';
const logCls   = t=> ({create:'create',edit:'edit',deact:'deact',login:'login',ot:'ot',emb:'emb'})[t]||'login';
const logUCls  = r=> r==='t'?'lu-t':r==='s'?'lu-s':'lu-g';
const initials = n=> n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();

// ── SECTIONS ──
function showSection(sec, el){
  document.querySelectorAll('.cfg-item').forEach(i=>i.classList.remove('on'));
  if(el) el.classList.add('on');
  const content = document.getElementById('cfg-content');
  if(sec==='usuarios')  renderUsuarios(content);
  else if(sec==='nuevo') renderNuevo(content);
  else if(sec==='auditoria') renderAuditoria(content);
  else if(sec==='sistema') renderSistema(content);
  else if(sec==='seguridad') renderSeguridad(content);
}

// ── USUARIOS ──
function renderUsuarios(el){
  const activos   = USERS.filter(u=>u.activo);
  const inactivos = USERS.filter(u=>!u.activo);

  el.innerHTML=`
    <div class="cfg-section-title">Gestión de usuarios</div>
    <div class="cfg-section-sub">Solo Gerencia puede crear, editar y desactivar usuarios del sistema.</div>

    <div class="alert-box info">

const ROLE_ACCESS = {
  t:['Dashboard','Órdenes de trabajo (propias)','Mantenimiento correctivo','Plan preventivo (lectura)','Activos y equipos (lectura)','Inventario (lectura)','Embalajes','Alertas (lectura)'],

  g:['Dashboard','Todas las operaciones (lectura)','Contratistas externos (lectura)','Plan preventivo (lectura)','Activos y equipos (lectura)','Embalajes','KPIs y reportes (completo)','Costos (completo)','Alertas','Configuración del sistema'],
};

function updateRolePreview(rol){
  const pv=document.getElementById('role-preview');
  const pc=document.getElementById('role-preview-content');
  if(!rol){pv.style.display='none';return;}
  pv.style.display='block';
  const acc=ROLE_ACCESS[rol]||[];
  pc.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">${acc.map(a=>`<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(200,210,225,0.7)"><span style="color:var(--ok)">✓</span>${a}</div>`).join('')}</div>`;
}

function checkPwStrength(val){
  const bar=document.getElementById('pw-bar');
  const hint=document.getElementById('pw-hint');
  if(!bar||!hint) return;
  let score=0;
  if(val.length>=8) score++;
  if(/[A-Z]/.test(val)) score++;
  if(/[0-9]/.test(val)) score++;
  if(/[^A-Za-z0-9]/.test(val)) score++;
  const colors=['var(--crit)','var(--crit)','var(--warn)','var(--warn)','var(--ok)'];
  const labels=['','Muy débil','Débil','Aceptable','Fuerte'];
  const labelColors=['','rgba(226,75,74,0.8)','rgba(239,159,39,0.8)','rgba(239,159,39,0.8)','rgba(99,153,34,0.8)'];
  bar.style.width=`${score*25}%`;
  bar.style.background=colors[score];
  hint.textContent=val.length>0?labels[score]:'';
  hint.style.color=labelColors[score];
}

function createUser(){
  const nombre=document.getElementById('n-nombre').value.trim();
  const email=document.getElementById('n-email').value.trim();
  const rol=document.getElementById('n-rol').value;
  const pw=document.getElementById('n-pw').value;
  if(!nombre||!email||!rol||!pw){toast('Completa todos los campos obligatorios','rgba(226,75,74,0.5)');return;}
  if(pw.length<8){toast('La contraseña debe tener mínimo 8 caracteres','rgba(226,75,74,0.5)');return;}
  if(USERS.find(u=>u.email===email)){toast('Ya existe un usuario con ese email','rgba(226,75,74,0.5)');return;}
  const newUser={
    id:USERS.length+1,name:nombre,email,rol,cargo:rolLabel[rol],
    activo:true,creado:'17/04/2025',ultimo:'Nunca',
    color:rol==='t'?'#185FA5':rol==='s'?'#854F0B':'#27500A',
    tc:rol==='t'?'#B5D4F4':rol==='s'?'#FAC775':'#C0DD97'
  };
  USERS.push(newUser);
  AUDIT_LOG.unshift({tipo:'create',user:'Carlos Reyes',urol:'g',accion:`Creó usuario ${nombre}`,detalle:`Rol: ${rolLabel[rol]} · ${email}`,tiempo:'Ahora'});

  showSection('usuarios',document.getElementById('ci-usuarios'));
}
