<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>QDC CMMS — Inventario</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#08223D;--mid:#0B2545;--deep:#061C2E;
  --accent:#2196F3;--white:#EEF4FF;
  --ok:#97C459;--warn:#EF9F27;--crit:#E24B4A;--ext:#5DCAA5;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.10);
  --surface:rgba(255,255,255,0.04);
  --font:'Barlow',sans-serif;--head:'Barlow Condensed',sans-serif;
}
body{font-family:var(--font);background:#050F1C;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.shell{display:flex;width:100%;max-width:1100px;height:840px;background:var(--mid);border-radius:12px;overflow:hidden;border:1px solid var(--border2);}

/* SIDEBAR */
.sidebar{width:210px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;border-right:1px solid var(--border);}
.sb-logo{padding:16px 14px 12px;border-bottom:1px solid var(--border);}
.sb-logo-mark{font-family:var(--head);font-size:16px;font-weight:700;color:var(--white);letter-spacing:1px;}
.sb-logo-sub{font-size:9px;color:rgba(131,131,139,0.6);margin-top:2px;}
.sb-logo-line{width:20px;height:2px;background:var(--accent);margin-top:5px;}
.sb-role{padding:8px 12px;border-bottom:1px solid var(--border);}
.sb-role-label{font-size:9px;color:rgba(131,131,139,0.5);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.role-sw{display:flex;gap:3px;}
.rbtn{flex:1;padding:5px 0;font-size:10px;font-weight:600;border-radius:3px;border:none;cursor:pointer;background:rgba(255,255,255,0.05);color:rgba(131,131,139,0.7);transition:all .15s;font-family:var(--font);}
.rbtn.on-t{background:#185FA5;color:#B5D4F4;}
.rbtn.on-s{background:#854F0B;color:#FAC775;}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0;}
.sb-nav::-webkit-scrollbar{width:2px;}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);}
.nav-sec{padding:10px 14px 3px;font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(131,131,139,0.4);}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;transition:background .1s;border-left:2px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,0.04);}
.nav-item.active{background:rgba(239,159,39,0.1);border-left-color:var(--warn);}
.nav-icon{font-size:13px;width:16px;text-align:center;flex-shrink:0;}
.nav-label{font-size:12px;color:rgba(200,210,225,0.7);flex:1;}
.nav-item.active .nav-label{color:var(--white);font-weight:500;}
.nav-badge{font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;background:#A32D2D;color:#F7C1C1;}
.nav-badge.w{background:#854F0B;color:#FAC775;}
.nav-badge.e{background:#0F6E56;color:#9FE1CB;}
.sb-user{padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.u-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.u-name{font-size:11px;color:var(--white);font-weight:500;}
.u-role{font-size:9px;color:rgba(131,131,139,0.6);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.topbar{height:50px;background:var(--mid);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;}
.page-title{font-family:var(--head);font-size:16px;font-weight:600;color:var(--white);flex:1;letter-spacing:0.5px;}
.search-wrap{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:5px;padding:5px 10px;}
.search-wrap input{background:none;border:none;outline:none;color:var(--white);font-size:12px;width:150px;font-family:var(--font);}
.search-wrap input::placeholder{color:rgba(131,131,139,0.5);}
.tb-btn{padding:6px 13px;border-radius:5px;border:none;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .15s;}
.btn-p{background:var(--accent);color:#fff;}
.btn-p:hover{background:#1976D2;}
.btn-warn{background:rgba(239,159,39,0.15);color:#FAC775;border:0.5px solid rgba(239,159,39,0.3);}
.btn-warn:hover{background:rgba(239,159,39,0.25);}
.btn-g{background:rgba(255,255,255,0.06);color:rgba(200,210,225,0.8);border:0.5px solid rgba(255,255,255,0.1);}
.btn-g:hover{background:rgba(255,255,255,0.1);}

/* STATS */
.stats-row{display:flex;gap:1px;background:rgba(255,255,255,0.04);border-bottom:1px solid var(--border);flex-shrink:0;}
.stat{flex:1;padding:10px 14px;text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .1s;}
.stat:hover{background:rgba(255,255,255,0.03);}
.stat.on{border-bottom-color:var(--warn);}
.stat-val{font-size:20px;font-weight:500;color:var(--white);}
.stat-val.ok{color:var(--ok);}
.stat-val.warn{color:var(--warn);}
.stat-val.crit{color:var(--crit);}
.stat-val.acc{color:#85B7EB;}
.stat-label{font-size:10px;color:rgba(131,131,139,0.5);margin-top:2px;}

/* FILTERS */
.filters-row{display:flex;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;align-items:center;flex-wrap:wrap;}
.fchip{padding:4px 11px;border-radius:10px;font-size:11px;cursor:pointer;border:0.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(200,210,225,0.6);transition:all .1s;}
.fchip:hover{background:rgba(255,255,255,0.08);}
.fchip.on{background:rgba(239,159,39,0.15);border-color:var(--warn);color:#FAC775;}
.cat-select{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:5px;color:rgba(200,210,225,0.8);font-size:11px;font-family:var(--font);padding:5px 8px;outline:none;cursor:pointer;}
.cat-select option{background:#0B2545;}

/* SPLIT */
.split{flex:1;display:flex;overflow:hidden;}

/* LEFT: ITEM LIST */
.list-panel{width:280px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.list-scroll{flex:1;overflow-y:auto;padding:6px;}
.list-scroll::-webkit-scrollbar{width:2px;}
.list-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);}

.item-card{padding:10px 11px;border-radius:7px;cursor:pointer;transition:background .1s;border:0.5px solid transparent;margin-bottom:3px;}
.item-card:hover{background:rgba(255,255,255,0.05);}
.item-card.selected{background:rgba(239,159,39,0.08);border-color:rgba(239,159,39,0.25);}
.item-card.critical{border-left:2px solid var(--crit);}
.item-card.low{border-left:2px solid var(--warn);}
.ic-row1{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px;}
.ic-cat{width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.ic-name{font-size:12px;font-weight:500;color:var(--white);line-height:1.3;flex:1;}
.ic-sku{font-size:9px;color:rgba(131,131,139,0.5);font-family:monospace;margin-top:1px;}
.ic-row2{display:flex;align-items:center;justify-content:space-between;}
.ic-stock{font-size:11px;font-weight:500;}
.stock-ok{color:var(--ok);}
.stock-warn{color:var(--warn);}
.stock-crit{color:var(--crit);}
.stock-out{color:var(--crit);}
.ic-bar-wrap{width:60px;}
.ic-bar{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.ic-bar-fill{height:100%;border-radius:2px;}

/* RIGHT: DETAIL */
.detail-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.detail-scroll{flex:1;overflow-y:auto;padding:16px;}
.detail-scroll::-webkit-scrollbar{width:3px;}
.detail-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);}
.empty-det{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:rgba(131,131,139,0.35);}

/* DETAIL CONTENT */
.det-header{display:flex;gap:14px;margin-bottom:14px;align-items:flex-start;}
.det-icon{width:58px;height:58px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);}
.det-info{flex:1;}
.det-name{font-family:var(--head);font-size:17px;font-weight:600;color:var(--white);margin-bottom:2px;}
.det-sku{font-size:10px;color:rgba(131,131,139,0.5);font-family:monospace;margin-bottom:6px;}
.det-badges{display:flex;gap:5px;flex-wrap:wrap;}
.dbadge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;}
.db-ok{background:rgba(99,153,34,0.15);color:#C0DD97;}
.db-warn{background:rgba(239,159,39,0.15);color:#FAC775;}
.db-crit{background:rgba(226,75,74,0.15);color:#F09595;}
.db-out{background:rgba(226,75,74,0.2);color:#F09595;}
.db-cat{background:rgba(255,255,255,0.07);color:rgba(200,210,225,0.7);}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.kpi{background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.07);border-radius:7px;padding:10px 12px;}
.kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:rgba(131,131,139,0.5);margin-bottom:5px;}
.kpi-val{font-size:20px;font-weight:500;color:var(--white);}
.kpi-sub{font-size:9px;color:rgba(131,131,139,0.45);margin-top:3px;}

/* STOCK LEVEL */
.stock-level-card{background:rgba(255,255,255,0.03);border:0.5px solid rgba(255,255,255,0.07);border-radius:8px;padding:14px;margin-bottom:14px;}
.sl-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.sl-title{font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:rgba(131,131,139,0.5);}
.sl-numbers{display:flex;gap:16px;}
.sl-num{text-align:center;}
.sl-num-val{font-size:18px;font-weight:600;font-family:var(--head);}
.sl-num-label{font-size:9px;color:rgba(131,131,139,0.5);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.sl-bar-wrap{position:relative;height:12px;background:rgba(255,255,255,0.06);border-radius:6px;overflow:hidden;margin-top:8px;}
.sl-bar-fill{height:100%;border-radius:6px;transition:width .5s;}
.sl-markers{position:relative;height:16px;margin-top:2px;}
.sl-marker{position:absolute;font-size:9px;color:rgba(131,131,139,0.5);transform:translateX(-50%);}
.sl-marker-line{position:absolute;top:-18px;width:1px;height:8px;background:rgba(255,255,255,0.2);}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:12px;}
.tab{padding:7px 14px;font-size:12px;cursor:pointer;color:rgba(200,210,225,0.45);border-bottom:2px solid transparent;transition:all .1s;}
.tab:hover{color:rgba(200,210,225,0.8);}
.tab.on{color:var(--white);border-bottom-color:var(--warn);font-weight:500;}

/* FICHA GRID */
.sec-title{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:rgba(131,131,139,0.45);margin-bottom:8px;}
.ficha-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
.fg{background:rgba(255,255,255,0.03);border-radius:5px;padding:8px 10px;}
.fg-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:rgba(131,131,139,0.4);margin-bottom:3px;}
.fg-val{font-size:12px;color:var(--white);}

/* MOVIMIENTOS */
.mov-list{display:flex;flex-direction:column;gap:5px;}
.mov-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;background:rgba(255,255,255,0.03);border:0.5px solid rgba(255,255,255,0.05);}
.mov-icon{font-size:14px;flex-shrink:0;}
.mov-info{flex:1;}
.mov-desc{font-size:12px;color:var(--white);}
.mov-meta{font-size:10px;color:rgba(131,131,139,0.5);margin-top:1px;}
.mov-qty{font-size:13px;font-weight:600;font-family:var(--head);flex-shrink:0;}
.qty-out{color:var(--crit);}
.qty-in{color:var(--ok);}

/* AJUSTE STOCK */
.adj-form{background:rgba(255,255,255,0.03);border:0.5px solid rgba(255,255,255,0.08);border-radius:8px;padding:14px;margin-bottom:12px;}
.adj-row{display:flex;gap:10px;align-items:flex-end;}
.adj-group{display:flex;flex-direction:column;gap:5px;flex:1;}
.adj-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(131,131,139,0.5);}
.adj-input{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:var(--white);font-size:12px;font-family:var(--font);padding:7px 10px;outline:none;transition:border-color .1s;}
.adj-input:focus{border-color:var(--warn);}
.adj-select{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:var(--white);font-size:12px;font-family:var(--font);padding:7px 10px;outline:none;}
.adj-select option{background:#0B2545;}
.adj-btn{padding:7px 16px;border-radius:6px;border:none;background:var(--warn);color:#000;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s;flex-shrink:0;}
.adj-btn:hover{background:#d4890a;}

/* SOLICITUD OC */
.oc-card{background:rgba(226,75,74,0.06);border:1px solid rgba(226,75,74,0.2);border-radius:8px;padding:12px;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
.oc-card.hidden{display:none;}
.oc-text{flex:1;font-size:12px;color:#F09595;line-height:1.5;}
.oc-btn{padding:6px 14px;border-radius:5px;border:none;background:rgba(226,75,74,0.2);color:#F09595;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:all .15s;}
.oc-btn:hover{background:rgba(226,75,74,0.35);}

/* MODAL */
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal-overlay.hidden{display:none;}
.modal{background:#0D2D48;border:0.5px solid rgba(255,255,255,0.1);border-radius:10px;width:500px;max-height:680px;overflow-y:auto;padding:22px;}
.modal::-webkit-scrollbar{width:3px;}
.modal::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-title{font-family:var(--head);font-size:16px;font-weight:600;color:var(--white);}
.modal-close{font-size:16px;color:rgba(131,131,139,0.6);cursor:pointer;background:none;border:none;padding:2px 6px;}
.modal-close:hover{color:var(--white);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-row.full{grid-template-columns:1fr;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:rgba(131,131,139,0.6);}
.req{color:#EF9F27;}
.form-input,.form-select{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:var(--white);font-size:12px;font-family:var(--font);padding:8px 10px;outline:none;transition:border-color .1s;}
.form-input:focus,.form-select:focus{border-color:var(--warn);}
.form-input::placeholder{color:rgba(131,131,139,0.4);}
.form-select option{background:#0D2D48;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.07);}
.btn-cancel{padding:7px 14px;border-radius:5px;border:0.5px solid rgba(255,255,255,0.1);background:transparent;color:rgba(200,210,225,0.7);cursor:pointer;font-size:12px;font-family:var(--font);}
.btn-save{padding:7px 18px;border-radius:5px;border:none;background:var(--warn);color:#000;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font);}
.btn-save:hover{background:#d4890a;}

.shell-wrap{position:relative;width:100%;max-width:1100px;}
</style>
</head>
<body>
<div class="shell-wrap">
<div class="shell">

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-mark">QDC</div>
    <div class="sb-logo-sub">Química del Campo S.p.A · CMMS Pro</div>
    <div class="sb-logo-line"></div>
  </div>
  <div class="sb-role">
    <div class="sb-role-label">Rol activo (demo)</div>
    <div class="role-sw">
      <button class="rbtn on-t" id="rb-t" onclick="setRole('t')">Téc.</button>
      <button class="rbtn" id="rb-s" onclick="setRole('s')">Sup.</button>
    </div>
  </div>
  <div class="sb-nav" id="sb-nav"></div>
  <div class="sb-user" id="sb-user"></div>
</nav>

<!-- MAIN -->
<div class="main" style="position:relative">
  <div class="topbar">
    <div class="page-title">Inventario & Repuestos</div>
    <div class="search-wrap">
      <span style="font-size:11px;color:rgba(131,131,139,0.5)">🔍</span>
      <input type="text" placeholder="Buscar SKU, descripción…" oninput="searchItems(this.value)"/>
    </div>
    <button class="tb-btn btn-warn" id="btn-oc">⚠ 3 items bajo mínimo</button>
    <button class="tb-btn btn-g">⬇ Exportar</button>
    <button class="tb-btn btn-p" id="btn-new" onclick="openModal()">+ Nuevo item</button>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat on" id="st-todos" onclick="setStatF('todos',this)"><div class="stat-val acc" id="sv-total">0</div><div class="stat-label">Total SKU</div></div>
    <div class="stat" id="st-crit" onclick="setStatF('critico',this)"><div class="stat-val crit" id="sv-crit">0</div><div class="stat-label">Stock agotado</div></div>
    <div class="stat" id="st-bajo" onclick="setStatF('bajo',this)"><div class="stat-val warn" id="sv-bajo">0</div><div class="stat-label">Bajo mínimo</div></div>
    <div class="stat" id="st-ok" onclick="setStatF('ok',this)"><div class="stat-val ok" id="sv-ok">0</div><div class="stat-label">Stock normal</div></div>
    <div class="stat"><div class="stat-val" style="color:#85B7EB" id="sv-valor">$0</div><div class="stat-label">Valor total inventario</div></div>
  </div>

  <!-- FILTERS -->
  <div class="filters-row">
    <span class="fchip on" onclick="chipF(this,'todos')">Todos</span>
    <span class="fchip" onclick="chipF(this,'critico')">Agotados</span>
    <span class="fchip" onclick="chipF(this,'bajo')">Bajo mínimo</span>
    <span class="fchip" onclick="chipF(this,'ok')">Normal</span>
    <select class="cat-select" onchange="setCat(this.value)">
      <option value="">Todas las categorías</option>
      <option>Rodamientos</option>
      <option>Lubricantes</option>
      <option>Filtros</option>
      <option>Sellos</option>
      <option>Eléctrico</option>
      <option>Mecánico</option>
      <option>Consumibles</option>
    </select>
  </div>

  <div class="split">
    <!-- LISTA -->
    <div class="list-panel">
      <div class="list-scroll" id="item-list"></div>
    </div>

    <!-- DETALLE -->
    <div class="detail-panel">
      <div class="empty-det" id="empty-det">
        <span style="font-size:36px;opacity:0.25">📦</span>
        <span style="font-size:13px">Selecciona un item para ver su ficha</span>
      </div>
      <div class="detail-scroll" id="det-content" style="display:none"></div>
    </div>
  </div>

  <!-- MODAL NUEVO ITEM -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Nuevo item de inventario</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label class="form-label">Descripción <span class="req">*</span></label>
          <input type="text" class="form-input" placeholder="ej: Rodamiento SKF 6205-2Z" id="f-desc"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">

let role='s', selected=null, detTab='ficha', statF='todos', catF='', searchTerm='';

function stockStatus(item){
  if(item.stock===0) return 'critico';
  if(item.stock<=item.min) return 'bajo';
  return 'ok';
}
function stockColor(st){ return st==='critico'?'var(--crit)':st==='bajo'?'var(--warn)':'var(--ok)'; }
function stockLabel(st){ return st==='critico'?'Agotado':st==='bajo'?'Bajo mínimo':'Normal'; }
function stockBadge(item){
  const st=stockStatus(item);
  if(st==='critico') return '<span class="dbadge db-out">Agotado</span>';
  if(st==='bajo') return '<span class="dbadge db-warn">Bajo mínimo</span>';
  return '<span class="dbadge db-ok">Normal</span>';
}

  let h='';
  NAV[role].forEach(g=>{
    h+=`<div class="nav-sec">${g.sec}</div>`;

      const ac=i.active?' active':'';
      const bc=i.bt==='w'?' w':i.bt==='e'?' e':'';
      const bd=i.b?`<span class="nav-badge${bc}">${i.b}</span>`:'';
      h+=`<div class="nav-item${ac}"><span class="nav-icon">${i.i}</span><span class="nav-label">${i.l}</span>${bd}</div>`;
    });
  });

}

}

function buildStats(){
  const total=ITEMS.length;
  const crit=ITEMS.filter(i=>stockStatus(i)==='critico').length;
  const bajo=ITEMS.filter(i=>stockStatus(i)==='bajo').length;
  const ok=ITEMS.filter(i=>stockStatus(i)==='ok').length;
  const valor=ITEMS.reduce((a,i)=>a+i.stock*i.precio,0);
  document.getElementById('sv-total').textContent=total;
  document.getElementById('sv-crit').textContent=crit;
  document.getElementById('sv-bajo').textContent=bajo;
  document.getElementById('sv-ok').textContent=ok;
  document.getElementById('sv-valor').textContent='$'+Math.round(valor/1000)+'K';
}

function getFiltered(){
  return ITEMS.filter(item=>{
    const st=stockStatus(item);
    const mf=statF==='todos'||statF===st;
    const cf=!catF||item.cat===catF;
    const sf=!searchTerm||item.desc.toLowerCase().includes(searchTerm)||item.id.toLowerCase().includes(searchTerm);
    return mf&&cf&&sf;
  });
}

function renderList(){
  const list=getFiltered();
  let h='';
  list.forEach(item=>{
    const st=stockStatus(item);
    const sc=stockColor(st);
    const pct=item.max>0?Math.min(100,Math.round(item.stock/item.max*100)):0;
    const cardCls=st==='critico'?' critical':st==='bajo'?' low':'';
    const sel=selected&&selected.id===item.id?' selected':'';
    const stockCls=st==='critico'?'stock-crit':st==='bajo'?'stock-warn':'stock-ok';
    h+=`<div class="item-card${cardCls}${sel}" onclick="selectItem('${item.id}')">

        <div class="ic-cat" style="background:rgba(255,255,255,0.05)">${item.icon}</div>

      <div class="ic-row2">
        <span class="ic-stock ${stockCls}">${item.stock} ${item.unidad}${item.stock!==1&&item.unidad==='Unidad'?'s':''}</span>

          <div class="ic-bar"><div class="ic-bar-fill" style="width:${pct}%;background:${sc}"></div></div>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('item-list').innerHTML=h||`<div style="padding:16px;text-align:center;font-size:11px;color:rgba(131,131,139,0.4)">Sin resultados</div>`;
}

function selectItem(id){
  selected=ITEMS.find(i=>i.id===id);

  renderList();
  renderDetail();
}

    </div>
  `;

  let body='';
  if(detTab==='ficha'){

      <div class="sec-title">Datos del item</div>

  } else if(detTab==='ajuste'){

            <select class="adj-select" id="adj-tipo">
              <option value="in">Entrada (recepción / devolución)</option>
              <option value="out">Salida (consumo / descarte)</option>
            </select>

          <div class="adj-group" style="flex:0.5">
            <label class="adj-label">Cantidad</label>

function setDetTab(t){ detTab=t; renderDetail(); }

function applyAdj(){
  const tipo=document.getElementById('adj-tipo').value;
  const qty=parseInt(document.getElementById('adj-qty').value)||0;
  const motivo=document.getElementById('adj-motivo').value||'Ajuste manual';
  if(qty<=0){ alert('Ingresa una cantidad válida'); return; }
  const delta=tipo==='in'?qty:-qty;
  if(tipo==='out'&&qty>selected.stock){ alert(`No hay suficiente stock. Disponible: ${selected.stock}`); return; }
  selected.stock=Math.max(0,selected.stock+delta);
  selected.movs.unshift({tipo,desc:motivo,fecha:'17/04/2025',qty:delta,by:ROLES[role].name.split(' ')[0]});
  buildStats();
  renderList();
  renderDetail();
}

function genOC(){
  alert(`Sistema real: genera Orden de Compra a ${selected.prov} por ${selected.max-selected.stock} unidades de "${selected.desc}" y la envía para aprobación.`);
}

function searchItems(v){ searchTerm=v.toLowerCase(); renderList(); }
function chipF(el,f){ document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('on')); el.classList.add('on'); statF=f; renderList(); }
function setStatF(f,el){ statF=f; document.querySelectorAll('.stat').forEach(s=>s.classList.remove('on')); el.classList.add('on'); renderList(); }
function setCat(v){ catF=v; renderList(); }
function openModal(){ document.getElementById('modal-overlay').classList.remove('hidden'); }
function closeModal(){ document.getElementById('modal-overlay').classList.add('hidden'); }

function saveItem(){
  const desc=document.getElementById('f-desc').value.trim();
  const sku=document.getElementById('f-sku').value.trim();
  const stock=parseInt(document.getElementById('f-stock').value)||0;
  const min=parseInt(document.getElementById('f-min').value)||0;
  if(!desc||!sku){ alert('Completa los campos obligatorios'); return; }
  const nuevo={
    id:sku.toUpperCase(),desc,cat:document.getElementById('f-cat').value,
    icon:'📦',stock,min,max:stock*2||10,
    precio:parseInt(document.getElementById('f-precio').value)||0,
    unidad:document.getElementById('f-unidad').value,
    prov:document.getElementById('f-prov').value,
    activos:document.getElementById('f-activos').value.split(',').map(s=>s.trim()).filter(Boolean),
    movs:[{tipo:'in',desc:'Stock inicial',fecha:'17/04/2025',qty:stock,by:ROLES[role].name.split(' ')[0]}]
  };
  ITEMS.unshift(nuevo);
  closeModal();
  buildStats();
  renderList();
  selectItem(nuevo.id);
}

document.getElementById('modal-overlay').addEventListener('click',function(e){ if(e.target===this) closeModal(); });

function setRole(r){
  role=r; selected=null;
  ['t','s'].forEach(x=>{ document.getElementById('rb-'+x).className='rbtn'+(x===r?` on-${r}`:''); });
  document.getElementById('btn-new').style.display=r==='s'?'':'none';
  buildNav(); buildUser(); buildStats(); renderList(); renderDetail();
}

setRole('s');
selectItem('SKF-6205');
</script>
