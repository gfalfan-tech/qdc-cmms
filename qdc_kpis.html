<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>QDC CMMS — KPIs y Reportes</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#08223D;--mid:#0B2545;--deep:#061C2E;
  --accent:#2196F3;--white:#EEF4FF;
  --ok:#97C459;--warn:#EF9F27;--crit:#E24B4A;--ext:#5DCAA5;--pm:#7F77DD;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.10);
  --surface:rgba(255,255,255,0.04);
  --font:'Barlow',sans-serif;--head:'Barlow Condensed',sans-serif;
}
body{font-family:var(--font);background:#050F1C;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.shell{display:flex;width:100%;max-width:1100px;height:860px;background:var(--mid);border-radius:12px;overflow:hidden;border:1px solid var(--border2);}

/* SIDEBAR */
.sidebar{width:210px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;border-right:1px solid var(--border);}
.sb-logo{padding:16px 14px 12px;border-bottom:1px solid var(--border);}
.sb-logo-mark{font-family:var(--head);font-size:16px;font-weight:700;color:var(--white);letter-spacing:1px;}
.sb-logo-sub{font-size:9px;color:rgba(131,131,139,0.6);margin-top:2px;}
.sb-logo-line{width:20px;height:2px;background:var(--accent);margin-top:5px;}
.sb-role{padding:8px 12px;border-bottom:1px solid var(--border);}
.sb-role-label{font-size:9px;color:rgba(131,131,139,0.5);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.role-sw{display:flex;gap:3px;}
.rbtn{flex:1;padding:5px 0;font-size:10px;font-weight:600;border-radius:3px;border:none;cursor:pointer;background:rgba(255,255,255,0.05);color:rgba(131,131,139,0.7);transition:all .15s;font-family:var(--font);}
.rbtn.on-s{background:#854F0B;color:#FAC775;}
.rbtn.on-g{background:#27500A;color:#C0DD97;}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0;}
.sb-nav::-webkit-scrollbar{width:2px;}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);}
.nav-sec{padding:10px 14px 3px;font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(131,131,139,0.4);}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;transition:background .1s;border-left:2px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,0.04);}
.nav-item.active{background:rgba(33,150,243,0.12);border-left-color:var(--accent);}
.nav-icon{font-size:13px;width:16px;text-align:center;flex-shrink:0;}
.nav-label{font-size:12px;color:rgba(200,210,225,0.7);flex:1;}
.nav-item.active .nav-label{color:var(--white);font-weight:500;}
.nav-badge{font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;background:#A32D2D;color:#F7C1C1;}
.nav-badge.w{background:#854F0B;color:#FAC775;}
.nav-badge.e{background:#0F6E56;color:#9FE1CB;}
.sb-user{padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.u-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.u-name{font-size:11px;color:var(--white);font-weight:500;}
.u-role{font-size:9px;color:rgba(131,131,139,0.6);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.topbar{height:50px;background:var(--mid);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;}
.page-title{font-family:var(--head);font-size:16px;font-weight:600;color:var(--white);flex:1;letter-spacing:0.5px;}
.period-select{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:5px;color:var(--white);font-size:12px;font-family:var(--font);padding:5px 10px;outline:none;cursor:pointer;}
.period-select option{background:#0B2545;}
.tb-btn{padding:6px 13px;border-radius:5px;border:none;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .15s;}
.btn-p{background:var(--accent);color:#fff;}
.btn-p:hover{background:#1976D2;}
.btn-g{background:rgba(255,255,255,0.06);color:rgba(200,210,225,0.8);border:0.5px solid rgba(255,255,255,0.1);}
.btn-g:hover{background:rgba(255,255,255,0.1);}

/* TABS */
.tab-bar{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:rgba(255,255,255,0.02);}
.tab{padding:10px 18px;font-size:12px;cursor:pointer;color:rgba(200,210,225,0.45);border-bottom:2px solid transparent;transition:all .1s;white-space:nowrap;}
.tab:hover{color:rgba(200,210,225,0.8);}
.tab.on{color:var(--white);border-bottom-color:var(--accent);font-weight:500;}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:16px;}
.content::-webkit-scrollbar{width:3px;}
.content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.kpi-card{background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.07);border-radius:8px;padding:14px;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi-card.blue::before{background:var(--accent);}
.kpi-card.green::before{background:var(--ok);}
.kpi-card.warn::before{background:var(--warn);}
.kpi-card.purple::before{background:var(--pm);}
.kpi-card.ext::before{background:var(--ext);}
.kpi-card.crit::before{background:var(--crit);}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(131,131,139,0.55);margin-bottom:6px;}
.kpi-val{font-size:26px;font-weight:600;font-family:var(--head);color:var(--white);}
.kpi-val.blue{color:#85B7EB;}
.kpi-val.green{color:var(--ok);}
.kpi-val.warn{color:var(--warn);}
.kpi-val.purple{color:#AFA9EC;}
.kpi-val.ext{color:var(--ext);}
.kpi-val.crit{color:var(--crit);}
.kpi-delta{font-size:11px;margin-top:5px;display:flex;align-items:center;gap:4px;}
.delta-up{color:var(--ok);}
.delta-down{color:var(--crit);}
.delta-neutral{color:rgba(131,131,139,0.5);}
.kpi-sub{font-size:10px;color:rgba(131,131,139,0.45);margin-top:3px;}

/* CHARTS GRID */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.charts-grid.three{grid-template-columns:1fr 1fr 1fr;}
.chart-card{background:rgba(255,255,255,0.03);border:0.5px solid rgba(255,255,255,0.07);border-radius:8px;padding:14px;}
.chart-card.wide{grid-column:1/-1;}
.chart-title{font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:rgba(131,131,139,0.5);margin-bottom:12px;}
.chart-wrap{position:relative;}

/* RANKING TABLE */
.rank-table{width:100%;border-collapse:collapse;}
.rank-table th{font-size:9px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:rgba(131,131,139,0.4);padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);}
.rank-table td{padding:8px 8px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:12px;color:var(--white);}
.rank-table tr:last-child td{border-bottom:none;}
.rank-table tr:hover td{background:rgba(255,255,255,0.03);}
.rank-num{font-size:11px;color:rgba(131,131,139,0.4);width:20px;}
.bar-inline{height:4px;border-radius:2px;margin-top:3px;}

/* COST TABLE */
.cost-table{width:100%;border-collapse:collapse;}
.cost-table th{font-size:9px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:rgba(131,131,139,0.4);padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);}
.cost-table td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:12px;}
.cost-table tr:hover td{background:rgba(255,255,255,0.03);}
.cost-int{color:#85B7EB;}
.cost-ext{color:var(--ext);}
.cost-total{color:var(--white);font-weight:500;}
.cost-badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:8px;}
.cb-int{background:rgba(33,150,243,0.12);color:#85B7EB;}
.cb-ext{background:rgba(29,158,117,0.12);color:var(--ext);}

/* SECTION TITLE */
.sec-title{font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:rgba(131,131,139,0.4);margin-bottom:10px;margin-top:4px;}

/* TREND INDICATOR */
.trend-row{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(200,210,225,0.5);margin-top:6px;}
.trend-arrow{font-size:12px;}

/* DONUT LEGEND */
.donut-legend{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.dl-item{display:flex;align-items:center;justify-content:space-between;font-size:11px;}
.dl-left{display:flex;align-items:center;gap:6px;color:rgba(200,210,225,0.7);}
.dl-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.dl-val{color:var(--white);font-weight:500;font-family:var(--head);}
</style>
</head>
<body>
<div class="shell">

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-mark">QDC</div>
    <div class="sb-logo-sub">Química del Campo S.p.A · CMMS Pro</div>
    <div class="sb-logo-line"></div>
  </div>
  <div class="sb-role">
    <div class="sb-role-label">Rol activo (demo)</div>
    <div class="role-sw">
      <button class="rbtn on-s" id="rb-s" onclick="setRole('s')">Supervisor</button>
      <button class="rbtn" id="rb-g" onclick="setRole('g')">Gerencia</button>
    </div>
  </div>
  <div class="sb-nav" id="sb-nav"></div>
  <div class="sb-user" id="sb-user"></div>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="page-title">KPIs y Reportes</div>
    <select class="period-select" id="period-sel" onchange="setPeriod(this.value)">
      <option value="mes">Abril 2025</option>
      <option value="trimestre">Q1 2025</option>
      <option value="anio">Año 2025</option>
    </select>
    <button class="tb-btn btn-g" onclick="exportReport()">⬇ Exportar PDF</button>
    <button class="tb-btn btn-p">📧 Enviar reporte</button>
  </div>

  <div class="tab-bar">
    <div class="tab on" id="tab-resumen" onclick="setTab('resumen')">Resumen ejecutivo</div>
    <div class="tab" id="tab-confiab" onclick="setTab('confiab')">Confiabilidad</div>
    <div class="tab" id="tab-costos" onclick="setTab('costos')">Costos</div>
    <div class="tab" id="tab-externos" onclick="setTab('externos')">Externos vs Internos</div>
  </div>

  <div class="content" id="content"></div>
</div>

</div>

<script>
const ROLES = {
  s:{name:"María Solís",  role:"Supervisora de Mantenimiento",color:"#854F0B",tc:"#FAC775",initials:"MS"},
  g:{name:"Carlos Reyes", role:"Gerente de Operaciones",      color:"#27500A",tc:"#C0DD97",initials:"CR"}
};
const NAV = {
  s:[
    {sec:"Principal",items:[{i:"▦",l:"Dashboard"},{i:"📋",l:"Órdenes de trabajo",b:"7"}]},
    {sec:"Mantenimiento",items:[{i:"🏢",l:"Contratistas externos",b:"2",bt:"e"},{i:"🔄",l:"Plan preventivo"},{i:"🔧",l:"Correctivo"}]},
    {sec:"Recursos",items:[{i:"🏭",l:"Activos"},{i:"📦",l:"Inventario",b:"3",bt:"w"},{i:"👷",l:"Personal"}]},
    {sec:"Análisis",items:[{i:"📊",l:"KPIs y reportes",active:true},{i:"💰",l:"Costos"}]},
    {sec:"Sistema",items:[{i:"🔔",l:"Alertas",b:"5"}]}
  ],
  g:[
    {sec:"Principal",items:[{i:"▦",l:"Dashboard"},{i:"📋",l:"OT"}]},
    {sec:"Operaciones",items:[{i:"🏢",l:"Contratistas externos"},{i:"🔄",l:"Plan preventivo"},{i:"🏭",l:"Activos"}]},
    {sec:"Análisis",items:[{i:"📊",l:"KPIs y reportes",active:true},{i:"💰",l:"Costos"}]},
    {sec:"Sistema",items:[{i:"🔔",l:"Alertas"},{i:"⚙️",l:"Configuración"}]}
  ]
};

let role='s', currentTab='resumen', period='mes';
let charts={};

function buildNav(){
  let h='';
  NAV[role].forEach(g=>{
    h+=`<div class="nav-sec">${g.sec}</div>`;
    g.items.forEach(i=>{
      const ac=i.active?' active':'';
      const bc=i.bt==='w'?' w':i.bt==='e'?' e':'';
      const bd=i.b?`<span class="nav-badge${bc}">${i.b}</span>`:'';
      h+=`<div class="nav-item${ac}"><span class="nav-icon">${i.i}</span><span class="nav-label">${i.l}</span>${bd}</div>`;
    });
  });
  document.getElementById('sb-nav').innerHTML=h;
}
function buildUser(){
  const u=ROLES[role];
  document.getElementById('sb-user').innerHTML=`<div class="u-av" style="background:${u.color};color:${u.tc}">${u.initials}</div><div><div class="u-name">${u.name}</div><div class="u-role">${u.role}</div></div>`;
}

// Chart helpers
function destroyCharts(){
  Object.values(charts).forEach(c=>{ try{c.destroy();}catch(e){} });
  charts={};
}

const MONTHS=['Oct','Nov','Dic','Ene','Feb','Mar','Abr'];
const gridColor='rgba(255,255,255,0.05)';
const tickColor='rgba(131,131,139,0.6)';
const baseOpts={
  responsive:true,maintainAspectRatio:false,
  plugins:{legend:{display:false},tooltip:{backgroundColor:'#0D2D48',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#EEF4FF',bodyColor:'#B5D4F4',padding:10}},
  scales:{x:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:10,family:'Barlow'}}},
          y:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:10,family:'Barlow'}}}}
};

// ── TAB: RESUMEN EJECUTIVO ──
function renderResumen(){
  const c=document.getElementById('content');
  c.innerHTML=`
    <div class="kpi-grid">
      <div class="kpi-card blue">
        <div class="kpi-label">Disponibilidad promedio</div>
        <div class="kpi-val blue">94.2%</div>
        <div class="kpi-delta delta-up">▲ +1.8% vs mes anterior</div>
        <div class="kpi-sub">Meta: 95%</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">Cumplimiento PM</div>
        <div class="kpi-val green">83%</div>
        <div class="kpi-delta delta-up">▲ +5% vs mes anterior</div>
        <div class="kpi-sub">18 rutinas activas</div>
      </div>
      <div class="kpi-card warn">
        <div class="kpi-label">MTTR (Tiempo reparación)</div>
        <div class="kpi-val warn">3.2h</div>
        <div class="kpi-delta delta-up">▼ −0.4h vs mes anterior</div>
        <div class="kpi-sub">Promedio mensual</div>
      </div>
      <div class="kpi-card purple">
        <div class="kpi-label">MTBF (Entre fallas)</div>
        <div class="kpi-val purple">312h</div>
        <div class="kpi-delta delta-up">▲ +18h vs mes anterior</div>
        <div class="kpi-sub">Meta: 280h</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">OT completadas</div>
        <div class="kpi-val blue">24</div>
        <div class="kpi-delta delta-neutral">→ igual mes anterior</div>
        <div class="kpi-sub">7 abiertas actualmente</div>
      </div>
      <div class="kpi-card ext">
        <div class="kpi-label">OT servicios externos</div>
        <div class="kpi-val ext">5</div>
        <div class="kpi-delta delta-neutral">21% del total</div>
        <div class="kpi-sub">3 contratistas activos</div>
      </div>
      <div class="kpi-card warn">
        <div class="kpi-label">OEE planta</div>
        <div class="kpi-val warn">78.4%</div>
        <div class="kpi-delta delta-up">▲ +2.1% vs mes anterior</div>
        <div class="kpi-sub">Disponib. × Rend. × Calidad</div>
      </div>
      <div class="kpi-card crit">
        <div class="kpi-label">Fallas no planificadas</div>
        <div class="kpi-val crit">6</div>
        <div class="kpi-delta delta-down">▲ +2 vs mes anterior</div>
        <div class="kpi-sub">Compresor C-101: 3 fallas</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">OT completadas — últimos 7 meses</div>
        <div class="chart-wrap" style="height:160px"><canvas id="ch-ot"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Tipo de mantenimiento — mes actual</div>
        <div style="display:flex;align-items:center;gap:16px">
          <div class="chart-wrap" style="height:140px;width:140px;flex-shrink:0"><canvas id="ch-tipo"></canvas></div>
          <div class="donut-legend" style="flex:1">
            <div class="dl-item"><div class="dl-left"><div class="dl-dot" style="background:#EF9F27"></div>Correctivo</div><div class="dl-val">38%</div></div>
            <div class="dl-item"><div class="dl-left"><div class="dl-dot" style="background:#7F77DD"></div>Preventivo</div><div class="dl-val">41%</div></div>
            <div class="dl-item"><div class="dl-left"><div class="dl-dot" style="background:#5DCAA5"></div>Externo</div><div class="dl-val">21%</div></div>
          </div>
        </div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card wide">
        <div class="chart-title">Disponibilidad por equipo crítico — mes actual</div>
        <div class="chart-wrap" style="height:160px"><canvas id="ch-disp"></canvas></div>
      </div>
    </div>
  `;

  setTimeout(()=>{
    destroyCharts();
    // OT chart
    charts.ot=new Chart(document.getElementById('ch-ot'),{
      type:'bar',
      data:{labels:MONTHS,datasets:[
        {label:'Preventivo',data:[8,9,7,11,10,9,10],backgroundColor:'rgba(127,119,221,0.6)',borderRadius:3},
        {label:'Correctivo',data:[5,7,9,6,8,7,9],backgroundColor:'rgba(239,159,39,0.6)',borderRadius:3},
        {label:'Externo',data:[2,1,3,2,2,3,5],backgroundColor:'rgba(93,202,165,0.6)',borderRadius:3},
      ]},
      options:{...baseOpts,plugins:{...baseOpts.plugins,legend:{display:true,position:'top',labels:{color:tickColor,font:{size:10,family:'Barlow'},boxWidth:10,padding:12}}},scales:{...baseOpts.scales,x:{...baseOpts.scales.x,stacked:true},y:{...baseOpts.scales.y,stacked:true}}}
    });
    // Tipo donut
    charts.tipo=new Chart(document.getElementById('ch-tipo'),{
      type:'doughnut',
      data:{labels:['Correctivo','Preventivo','Externo'],datasets:[{data:[38,41,21],backgroundColor:['rgba(239,159,39,0.8)','rgba(127,119,221,0.8)','rgba(93,202,165,0.8)'],borderWidth:0,hoverOffset:4}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'72%',plugins:{legend:{display:false},tooltip:{backgroundColor:'#0D2D48',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#EEF4FF',bodyColor:'#B5D4F4'}}}
    });
    // Disponibilidad
    charts.disp=new Chart(document.getElementById('ch-disp'),{
      type:'bar',
      data:{labels:['Compresor C-101','Bomba P-205','Motor MO-18','Enfriadora CH-3','Turbina T-01','Tablero E-01'],
        datasets:[{data:[72,94,98,96,99,85],backgroundColor:(ctx)=>{const v=ctx.raw;return v>=95?'rgba(151,196,89,0.7)':v>=80?'rgba(33,150,243,0.7)':'rgba(226,75,74,0.7)';},borderRadius:4}]},
      options:{...baseOpts,indexAxis:'y',plugins:{...baseOpts.plugins,tooltip:{...baseOpts.plugins.tooltip,callbacks:{label:(c)=>`${c.raw}%`}}},scales:{x:{...baseOpts.scales.x,max:100,ticks:{...baseOpts.scales.x.ticks,callback:(v)=>`${v}%`}},y:{...baseOpts.scales.y,grid:{display:false}}}}
    });
  },50);
}

// ── TAB: CONFIABILIDAD ──
function renderConfiab(){
  const c=document.getElementById('content');
  c.innerHTML=`
    <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="kpi-card blue">
        <div class="kpi-label">MTBF promedio planta</div>
        <div class="kpi-val blue">312h</div>
        <div class="kpi-delta delta-up">▲ +18h — mejora continua</div>
        <div class="kpi-sub">Mean Time Between Failures</div>
      </div>
      <div class="kpi-card warn">
        <div class="kpi-label">MTTR promedio planta</div>
        <div class="kpi-val warn">3.2h</div>
        <div class="kpi-delta delta-up">▼ −0.4h — reducción positiva</div>
        <div class="kpi-sub">Mean Time To Repair</div>
      </div>
      <div class="kpi-card green">

function setTab(t){
  currentTab=t;
  ['resumen','confiab','costos','externos'].forEach(x=>{
    document.getElementById('tab-'+x).className='tab'+(x===t?' on':'');
  });
  destroyCharts();
  if(t==='resumen') renderResumen();
  else if(t==='confiab') renderConfiab();
  else if(t==='costos') renderCostos();
  else if(t==='externos') renderExternos();
}

function setPeriod(v){ period=v; setTab(currentTab); }

function exportReport(){
  alert('Sistema real: genera PDF del reporte con todos los KPIs, gráficos y tablas del período seleccionado y lo descarga o envía por email.');
}

function setRole(r){
  role=r;
  ['s','g'].forEach(x=>{ document.getElementById('rb-'+x).className='rbtn'+(x===r?` on-${r}`:''); });
  buildNav(); buildUser();
  setTab(currentTab);
}

setRole('s');
